# ─────────────────────────────────────────
# DEPLOYMENT — parking-game app
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-game
  namespace: parking-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parking-game
  template:
    metadata:
      labels:
        app: parking-game
    spec:
      containers:
        - name: parking-game
          image: mariuseu/parking-game:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: parking-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ─────────────────────────────────────────
# SERVICE — NodePort 32527
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: parking-game-service
  namespace: parking-game
spec:
  selector:
    app: parking-game
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 32530
  type: NodePort
---
# ─────────────────────────────────────────
# INGRESS
# ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parking-game-ingress
  namespace: parking-game
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: parking.slax.ro

      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parking-game-service
                port:
                  number: 80